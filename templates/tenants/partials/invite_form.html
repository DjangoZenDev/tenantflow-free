<!-- Invite Member Form -->
<form method="post" action="{% url 'invite_member' %}"
      hx-post="{% url 'invite_member' %}"
      hx-target="#team-list"
      hx-swap="innerHTML">
    {% csrf_token %}

    <div class="space-y-4">
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" name="email" id="email" required
                   placeholder="colleague@company.com"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
        </div>

        <div>
            <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
            <select name="role" id="role"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 bg-white">
                <option value="member">Member</option>
                <option value="admin">Admin</option>
                <option value="viewer">Viewer</option>
            </select>
            <p class="mt-1 text-xs text-gray-500">
                <strong>Admin:</strong> Can manage team and settings.
                <strong>Member:</strong> Can access all features.
                <strong>Viewer:</strong> Read-only access.
            </p>
        </div>

        <div class="flex items-center justify-end space-x-3 pt-2">
            <button type="button"
                    @click="showInviteModal = false"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                Cancel
            </button>
            <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white brand-bg rounded-lg brand-bg-hover transition-colors shadow-sm">
                Send Invitation
            </button>
        </div>
    </div>
</form>
